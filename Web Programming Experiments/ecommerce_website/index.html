<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TechStore</h1>
        <p>Your one-stop shop for modern electronics.</p>
    </header>
    
    <main>
        <section class="products-section">
            <h2>Featured Products</h2>
            <div id="product-list" class="grid"></div>
        </section>

        <section class="cart-section">
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-summary">
                <h3>Total: $<span id="cart-total">0.00</span></h3>
            </div>
        </section>

        <section class="checkout-section">
            <h2>Checkout</h2>
            <form id="checkout-form">
                <input type="text" id="cust-name" placeholder="Full Name" required>
                <input type="text" id="cust-address" placeholder="Shipping Address" required>
                <button type="submit" class="btn checkout-btn">Complete Purchase</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
