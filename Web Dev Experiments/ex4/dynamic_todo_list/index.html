<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Dynamic To-Do List</h1>
        <p class="description">
            This application allows users to add, edit, delete, and mark tasks as completed dynamically using JavaScript.
        </p>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addTaskBtn">Add Task</button>
        </div>

        <!-- Task Counter -->
        <div class="task-status">
            <span id="pendingCount">Pending: 0</span>
            <span id="completedCount">Completed: 0</span>
        </div>

        <!-- Task List -->
        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
