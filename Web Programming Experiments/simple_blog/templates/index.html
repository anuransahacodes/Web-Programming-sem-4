{% extends 'base.html' %}

{% block content %}
    <h1 class="page-title">Recent Posts</h1>
    
    {% if posts %}
        <div class="post-list">
            {% for post in posts %}
                <div class="post-card">
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.content }}</p>
                    <div class="post-actions">
                        <a href="{{ url_for('edit', post_id=post.id) }}" class="btn-edit">Edit</a>
                        <form action="{{ url_for('delete', post_id=post.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn-delete">Delete</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-state">No blog posts found. Create one to get started!</p>
    {% endif %}
{% endblock %}
